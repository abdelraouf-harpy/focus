<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus System | By Harpy</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --primary: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .card {
            background: var(--card);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.03);
            text-align: center;
            width: 100%;
        }

        .hidden { display: none !important; }

        h2 { margin-bottom: 25px; font-weight: 800; font-size: 1.5rem; }

        .input-group { margin-bottom: 18px; text-align: right; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; padding-right: 5px; }
        
        .input-field {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 1rem;
            text-align: center;
        }

        .time-row { display: flex; gap: 12px; }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add { background: var(--primary); color: #020617; }
        .btn-start { background: #f8fafc; color: #020617; margin-top: 15px; }
        .btn-finish { background: var(--danger); color: white; margin-top: 15px; }
        .btn-ctrl { background: #334155; color: white; flex: 1; }

        .timer-display {
            font-size: 3rem;
            font-weight: 800;
            margin: 15px 0;
            color: var(--text-main);
            font-family: monospace;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        #motivationalModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            max-width: 350px;
            text-align: center;
            border: 2px solid var(--primary);
        }

        .quote-text { font-size: 1.2rem; line-height: 1.6; margin-bottom: 20px; font-weight: 600; color: var(--primary); }

        .signature { margin-top: 25px; text-align: center; font-size: 0.85rem; color: var(--text-dim); }
        .signature a { color: var(--primary); font-weight: 700; text-decoration: none; transition: 0.3s; }

        .next-task-box {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .next-task-box span { color: var(--primary); font-weight: 600; display: block; margin-top: 4px; }

        .task-counter {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }

        /* تنبيه حالة الحماية الهادئ */
        .status-badge {
            font-size: 0.7rem;
            color: var(--success);
            margin-top: 5px;
            opacity: 0.7;
        }

        @media screen and (min-width: 420px) { .timer-display { font-size: 4.8rem; } }
    </style>
</head>
<body>

<div class="container">
    <div id="setupView" class="card">
        <h2>إعداد المهمة</h2>
        <div class="input-group">
            <label>اسم المهمة</label>
            <input type="text" id="tName" class="input-field">
        </div>
        <div class="time-row">
            <div class="input-group" style="flex:1">
                <label>ساعات</label>
                <input type="number" id="tH" class="input-field">
            </div>
            <div class="input-group" style="flex:1">
                <label>دقائق</label>
                <input type="number" id="tM" class="input-field">
            </div>
        </div>
        <button class="btn-add" onclick="core.add()">إضافة للقائمة</button>
        <div id="countDisplay" class="task-counter hidden">عدد المهام المضافة: 0</div>
        <button id="startBtn" class="btn-start hidden" onclick="core.begin()">بدء تنفيذ المهام</button>
    </div>

    <div id="focusView" class="card hidden">
        <div id="activeTask" style="color:var(--primary); font-weight:700; font-size: 1.2rem;">-</div>
        <div class="timer-display" id="disp">00:00:00</div>
        <div style="display:flex; gap:10px;">
            <button id="pBtn" class="btn-ctrl" onclick="core.toggle()">إيقاف مؤقت</button>
            <button class="btn-ctrl" onclick="core.reset()">إعادة</button>
        </div>
        <button class="btn-finish" onclick="core.finishOne()">إنهاء المهمة الحالية</button>
        
        <div id="nextTaskContainer" class="next-task-box">
            المهمة التالية:
            <span id="nextTaskName">-</span>
        </div>
    </div>

    <div id="motivationalModal" class="hidden">
        <div class="modal-content">
            <div id="modalEmoji" style="font-size: 2.5rem; margin-bottom: 10px;">🌟</div>
            <div id="quoteArea" class="quote-text">أنت بطل!</div>
            <button id="modalBtn" class="btn-add" onclick="core.closeModal()">استمرار</button>
        </div>
    </div>

    <div class="signature">Developed by <a href="https://www.facebook.com/share/1epCcKiKJo/" target="_blank">Harpy</a></div>
</div>

    const core = {
        list: [], timer: null, left: 0, paused: false, allDone: false,
        wakeLock: null,

        // طلب منع سكون الشاشة (Wake Lock API) - يعمل فقط في الاستضافة HTTPS
        async requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            this.wakeLock = await navigator.wakeLock.request('screen');
            console.log("Wake Lock is active!"); // سيظهر في الكونسول للمبرمجين فقط
        }
    } catch (err) {
        console.log("Wake Lock error: " + err);
    }
},

        releaseWakeLock() {
            if (this.wakeLock) { this.wakeLock.release(); this.wakeLock = null; }
        },

        add() {
            const name = document.getElementById('tName').value.trim();
            const h = parseInt(document.getElementById('tH').value) || 0;
            const m = parseInt(document.getElementById('tM').value) || 0;
            if(!name || (h===0 && m===0)) return;
            this.list.push({ name, sec: (h*3600) + (m*60) });
            document.getElementById('tName').value = '';
            document.getElementById('tH').value = '';
            document.getElementById('tM').value = '';
            this.updateUI();
        },

        updateUI() {
            const count = this.list.length;
            const countDiv = document.getElementById('countDisplay');
            const startBtn = document.getElementById('startBtn');
            if (count > 0) {
                countDiv.classList.remove('hidden');
                countDiv.textContent = `عدد المهام المضافة حتى الآن: ${count}`;
                startBtn.classList.remove('hidden');
            } else {
                countDiv.classList.add('hidden');
                startBtn.classList.add('hidden');
            }
        },

        begin() {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('focusView').classList.remove('hidden');
            this.requestWakeLock(); // التفعيل عند البدء
            this.load();
        },

        load() {
            const current = this.list[0];
            document.getElementById('activeTask').textContent = current.name;
            this.left = current.sec;
            this.paused = false;
            const next = this.list[1];
            document.getElementById('nextTaskName').textContent = next ? next.name : "لا توجد مهام قادمة";
            this.updateDisp();
            this.start();
        },

        start() {
            clearInterval(this.timer);
            this.timer = setInterval(() => {
                if(!this.paused) {
                    if(this.left > 0) { this.left--; this.updateDisp(); }
                    else { this.finishOne(); }
                }
            }, 1000);
        },

        updateDisp() {
            const h = Math.floor(this.left / 3600);
            const m = Math.floor((this.left % 3600) / 60);
            const s = this.left % 60;
            document.getElementById('disp').textContent = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        },

        toggle() {
            this.paused = !this.paused;
            const b = document.getElementById('pBtn');
            b.textContent = this.paused ? "استئناف" : "إيقاف مؤقت";
            b.style.background = this.paused ? "var(--success)" : "#334155";
            if(this.paused) this.releaseWakeLock(); else this.requestWakeLock();
        },

        reset() { this.left = this.list[0].sec; this.updateDisp(); },

        finishOne() {
            clearInterval(this.timer);
            this.list.shift();
            if(this.list.length === 0) {
                this.allDone = true;
                this.releaseWakeLock();
                this.showFinalMessage();
            } else {
                this.showMotivation();
            }
        },

        showMotivation() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quoteArea').textContent = randomQuote;
            document.getElementById('motivationalModal').classList.remove('hidden');
        },

        showFinalMessage() {
            document.getElementById('modalEmoji').textContent = "🏆";
            document.getElementById('quoteArea').innerHTML = "رسالة من <span style='color:white; font-weight:800;'>Harpy</span>:<br><br>لقد أتممت جميع مهامك بنجاح باهر! أنت الآن شخص أفضل مما كنت عليه قبل البدء. فخور بك!";
            document.getElementById('modalBtn').textContent = "إغلاق وبدء يوم جديد";
            document.getElementById('motivationalModal').classList.remove('hidden');
        },

        closeModal() {
            document.getElementById('motivationalModal').classList.add('hidden');
            if(this.allDone) { location.reload(); }
            else if(this.list.length > 0) { this.load(); }
        }
    };

    // إعادة طلب الحماية إذا خرج المستخدم وعاد للمتصفح
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && !core.paused && !core.allDone && core.timer) {
            core.requestWakeLock();
        }
    });
</script>
</body>
</html>
