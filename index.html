<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus System | By Harpy</title>
    
    <!-- ربط الـ Manifest والخطوط -->
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- ربط ملف التصميم الخارجي اللي عملناه -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- شاشة الإعداد (Setup) -->
    <div id="setupView" class="card">
        <h2>إعداد المهمة</h2>
        
        <div class="input-group">
            <label>اسم المهمة</label>
            <input type="text" id="tName" class="input-field" placeholder="ماذا ستنجز الآن؟">
        </div>

        <div class="time-row">
            <div class="input-group" style="flex:1">
                <label>ساعات</label>
                <input type="number" id="tH" class="input-field" value="0" min="0">
            </div>
            <div class="input-group" style="flex:1">
                <label>دقائق</label>
                <input type="number" id="tM" class="input-field" value="0" min="0" max="59">
            </div>
        </div>

        <!-- زر الإضافة للقائمة -->
        <button class="btn-add" onclick="core.add()">
            <span>+</span> إضافة للقائمة
        </button>

        <!-- عداد المهام اللي كان بيظهر تحت زر الإضافة -->
        <div id="countDisplay" class="hidden" style="margin-top: 15px; font-weight: 600; color: var(--primary); font-size: 0.9rem;">
            عدد المهام المضافة حتى الآن: <span id="taskCount">0</span>
        </div>

        <!-- زر بدء التنفيذ اللي بيظهر لما نضيف مهمة -->
        <button id="startBtn" class="btn-start hidden" onclick="core.begin()">
            بدء تنفيذ المهام
        </button>
    </div>

    <!-- شاشة التركيز (Focus Mode) -->
    <div id="focusView" class="card hidden">
        <!-- عداد المهام المتبقية فوق اسم المهمة -->
        <div id="taskProgress" style="font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px;"></div>
        
        <div id="activeTask" style="color:var(--primary); font-weight:800; font-size: 1.3rem; margin-bottom: 10px;">-</div>
        
        <!-- التايمر (تم ضبطه في ملف CSS ليكون متجاوباً) -->
        <div class="timer-display" id="disp">00:00:00</div>

        <!-- أزرار التحكم -->
        <div style="display:flex; gap:12px; margin-bottom: 15px;">
            <button id="pBtn" class="btn-ctrl" onclick="core.toggle()">إيقاف مؤقت</button>
            <button class="btn-ctrl" onclick="core.reset()">إعادة</button>
        </div>
        
        <!-- زر إنهاء المهمة الأساسي -->
        <button class="btn-finish" onclick="core.finishOne()">
            إنهاء المهمة الحالية
        </button>
        
        <!-- صندوق المهمة التالية اللي كان موجود في الكود الأصلي -->
        <div id="nextTaskBox" class="next-task-box" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);">
            <span style="font-size: 0.8rem; color: var(--text-dim);">المهمة التالية:</span>
            <span id="nextTaskName" style="color:var(--primary); font-weight:600; display:block; margin-top:4px;">-</span>
        </div>
    </div>

    <!-- نافذة الجمل التحفيزية (Modal) -->
    <div id="motivationalModal" class="hidden">
        <div class="modal-content">
            <div id="modalEmoji" style="font-size: 3rem; margin-bottom: 10px;">🌟</div>
            <!-- الجملة بتظهر هنا زي ما كانت في كودك الأصلي -->
            <div id="quoteArea" class="quote-text"></div>
            <button class="btn-add" onclick="core.closeModal()" style="width: 100%;">استمرار</button>
        </div>
    </div>

    <!-- الرابط والتوقيع اللي أكدت عليهم -->
    <div class="signature">
        Developed by <a href="https://www.facebook.com/share/1epCcKiKJo/" target="_blank">Harpy</a>
    </div>
</div>

<!-- ربط ملف الـ JavaScript الخارجي اللي فيه الـ 100 جملة -->
<script src="script.js"></script>

</body>
</html>
