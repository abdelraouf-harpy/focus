<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus System | By Harpy</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="setupView" class="card">
        <h2>إعداد المهمة</h2>
        <div class="input-group">
            <label>اسم المهمة</label>
            <input type="text" id="tName" class="input-field">
        </div>
        <div class="time-row">
            <div class="input-group" style="flex:1">
                <label>ساعات</label>
                <input type="number" id="tH" class="input-field" value="0">
            </div>
            <div class="input-group" style="flex:1">
                <label>دقائق</label>
                <input type="number" id="tM" class="input-field" value="0">
            </div>
        </div>
        <button class="btn-add" onclick="core.add()">إضافة للقائمة</button>
        <div id="countDisplay" class="hidden" style="margin-top:10px; color:var(--primary);"></div>
        <button id="startBtn" class="btn-start hidden" onclick="core.begin()">بدء تنفيذ المهام</button>
    </div>

    <div id="focusView" class="card hidden">
        <div id="activeTask" style="color:var(--primary); font-weight:700;">-</div>
        <div class="timer-display" id="disp">00:00:00</div>
        <div style="display:flex; gap:10px;">
            <button id="pBtn" class="btn-ctrl" onclick="core.toggle()">إيقاف مؤقت</button>
            <button class="btn-ctrl" onclick="core.reset()">إعادة</button>
        </div>
        <button class="btn-finish" onclick="core.finishOne()">إنهاء المهمة</button>
    </div>

    <div id="motivationalModal" class="hidden">
        <div class="modal-content">
            <div id="modalEmoji" style="font-size: 2.5rem;">🌟</div>
            <div id="quoteArea" class="quote-text"></div>
            <button class="btn-add" onclick="core.closeModal()">استمرار</button>
        </div>
    </div>

    <div class="signature">Developed by <a href="https://www.facebook.com/share/1epCcKiKJo/" target="_blank">Harpy</a></div>
</div>

<script src="script.js"></script>
</body>
</html>
