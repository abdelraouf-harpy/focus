<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- واجهة الترحيب لأول مرة -->
<div id="welcomeModal" class="fixed-modal hidden">
    <div class="modal-content">
        <h2>أهلاً بك في Focus</h2>
        <p>عشان نخصص لك التجربة، قولي اسمك ونوعك:</p>
        <input type="text" id="userNameInput" class="input-field" placeholder="اسمك إيه؟" style="margin-bottom: 15px;">
        <div class="gender-selection">
            <button class="gender-btn" onclick="setGender('male')">ولد </button>
            <button class="gender-btn" onclick="setGender('female')">بنت </button>
        </div>
    </div>
</div>

<div class="container">
    <!-- إضافة الاسم المضيء هنا فوق الكارت -->
    <div id="userGlowHeader" class="user-glow-container hidden">
        <span id="userDisplayName"></span>
    </div>

    <!-- واجهة الإعداد -->
    <div id="setupView" class="card">
        <h2 id="setupTitle">إعداد المهمة</h2>
        <div class="input-group">
            <label>اسم المهمة</label>
            <input type="text" id="tName" class="input-field" placeholder="" autocomplete="off">
        </div>
        <div class="time-row">
            <div class="input-group" style="flex:1">
                <label>ساعات</label>
                <input type="number" id="tH" class="input-field" min="0" placeholder="">
            </div>
            <div class="input-group" style="flex:1">
                <label>دقائق</label>
                <input type="number" id="tM" class="input-field" min="0" max="59" placeholder="">
            </div>
        </div>
        <button class="btn-add" onclick="core.add()">إضافة للقائمة</button>
        <div id="countDisplay" class="task-counter hidden">عدد المهام المضافة حتى الآن: 0</div>
        <button id="startBtn" class="btn-start hidden" onclick="core.begin()">بدء تنفيذ المهام</button>
    </div>

    <!-- واجهة التركيز -->
    <div id="focusView" class="card hidden">
        <div id="activeTask" style="color:var(--primary); font-weight:700; font-size: 1.2rem;">-</div>
        <div class="timer-display" id="disp">00:00:00</div>
        <div style="display:flex; gap:10px;">
            <button id="pBtn" class="btn-ctrl" onclick="core.toggle()">إيقاف مؤقت</button>
            <button class="btn-ctrl" onclick="core.reset()">إعادة</button>
        </div>
        <button class="btn-finish" onclick="core.finishOne()">إنهاء المهمة الحالية</button>
        
        <div id="nextTaskContainer" class="next-task-box">
            المهمة التالية:
            <span id="nextTaskName">-</span>
        </div>
    </div>

    <!-- مودال الجمل التحفيزية -->
    <div id="motivationalModal" class="hidden">
        <div class="modal-content">
            <div id="modalEmoji" style="font-size: 2.5rem; margin-bottom: 10px;">🌟</div>
            <div id="quoteArea" class="quote-text">أنت بطل!</div>
            <button id="modalBtn" class="btn-add" onclick="core.closeModal()">استمرار</button>
        </div>
    </div>

    <div class="signature">Developed by <a href="https://www.facebook.com/share/1epCcKiKJo/" target="_blank">Harpy</a></div>
</div>

<script src="script.js"></script>
</body>
</html>
